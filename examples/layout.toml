# Example vrandr configuration file.
#
# This file is the format written by `vrandr` when you press `S`. It is also
# the format `vrandr` reads on startup if you answer `y` to the load
# prompt. You can hand-edit it.
#
# Location: $XDG_CONFIG_HOME/vrandr/layout.toml
#           (default: ~/.config/vrandr/layout.toml)

version = 1

# Each [[outputs]] block describes the *final* state of a single output.
# The order does not matter.

[[outputs]]
name = "eDP-1"          # the output name as reported by xrandr
mode = "1920x1080"      # resolution (any name xrandr knows)
rate = 60.0             # refresh rate in Hz
primary = true          # mark this as the primary output
rotation = "normal"     # normal | left | right | inverted
reflection = "normal"   # normal | x | y | xy
scale = [1.0, 1.0]      # x and y scale factors
# scale_from = [1920.0, 1080.0]   # --scale-from equivalent
# gamma = [1.0, 1.0, 1.0]         # R:G:B
position = [0, 0]       # absolute position
# relative = { to = "HDMI-1", pos = "right-of" }  # relative position
off = false

[[outputs]]
name = "HDMI-1"
mode = "1920x1080"
rate = 59.94
primary = false
rotation = "normal"
reflection = "normal"
scale = [1.0, 1.0]
relative = { to = "eDP-1", pos = "right-of" }
off = false

[[outputs]]
name = "DP-1"
mode = "2560x1440"
rate = 60.0
primary = false
rotation = "left"
reflection = "normal"
scale = [1.0, 1.0]
position = [1920, -900]  # above HDMI-1, rotated 90deg
off = false

# Optionally, custom modelines you previously registered with
# `xrandr --newmode`. They will be re-applied on load.
# [[custom_modes]]
# name = "1920x1080R"
# modeline = "138.50 1920 1968 2000 2080 1080 1083 1088 1111 +hsync -vsync"
